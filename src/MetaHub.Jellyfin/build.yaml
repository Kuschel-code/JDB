overview: "Aggregated, cross-linked metadata and artwork from a self-hosted MetaHub instance."
description: >
  MetaHub serves a single canonical view per media item (music, movies, series, anime,
  books), cross-linked by ID and cached locally. This plugin adds a tabbed settings page
  and (in later milestones) metadata/image providers that fetch from your MetaHub server.
category: "Metadata"
artifacts:
  - "MetaHub.Jellyfin.dll"
changelog: >
  0.1.8.5 - Anime films, OVAs and specials now get their ids, overview, artwork and cast instead of
  just a bare folder title. Several name-matching gaps are fixed: titles with brackets/parentheses
  ("Fate/stay night [Heaven's Feel] I. presage flower") now match a folder using either form; folder
  names ending in a "I."/"II." part are no longer truncated at the dot (the subtitle and year
  survived); a "Movie:" in the canonical title no longer blocks a folder that omits it; and anime
  films/OVAs placed in a library named "Filme"/"Movies"/"Serien" are no longer filtered out by media
  type. Name (folder) matches now also run on-demand enrichment like id matches, so a folder-matched
  work fills its overview/images/people. Re-run the anime ingest task once so the search index picks
  up the new normalization.
  0.1.8.4 - Stability fixes from a code audit: the embedded SQLite database now uses WAL +
  busy_timeout and the read paths fail soft, so concurrent library scans no longer drop an item's
  metadata with "database is locked"; the "Apply metadata to library" task no longer aborts on a
  single bad item; book enrichment tolerates empty Open Library fields; TMDB tv vs movie ids no
  longer collide; and titles with a non-ASCII uppercase letter now match by name.
  0.1.8.3 - Name matching now also searches each work's synonyms/alternate titles, so an item
  whose folder uses an English name (e.g. "Even If the World Ends Tomorrow") is recognized even
  when the canonical title is the romaji ("Ashita Sekai ga Owaru to Shitemo"). Re-run the anime
  ingest task after updating so synonyms are indexed.