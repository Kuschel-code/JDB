overview: "Aggregated, cross-linked metadata and artwork from a self-hosted MetaHub instance."
description: >
  MetaHub serves a single canonical view per media item (music, movies, series, anime,
  books), cross-linked by ID and cached locally. This plugin adds a tabbed settings page
  and (in later milestones) metadata/image providers that fetch from your MetaHub server.
category: "Metadata"
artifacts:
  - "MetaHub.Jellyfin.dll"
changelog: >
  0.1.7.2 - MetaHub is now listed under episode image fetchers; items without provider ids
  are matched by title (lookup name, then the cleaned folder/file name) against the local
  database, with year disambiguation; when nothing matches the folder name is used as the
  title so items never keep empty names; scheduled tasks now report progress.