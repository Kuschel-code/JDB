changelog: >
  0.1.8.2 - Sequel recognition fix: the folder name is now authoritative, so "… Reawakened"
  resolves to the sequel instead of the base series even when Jellyfin pre-set the base name.
  New setting "Match by folder/file name when no ID matches" to toggle name-based matching.