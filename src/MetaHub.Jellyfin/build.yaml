overview: "Aggregated, cross-linked metadata and artwork from a self-hosted MetaHub instance."
description: >
  MetaHub serves a single canonical view per media item (music, movies, series, anime,
  books), cross-linked by ID and cached locally. This plugin adds a tabbed settings page
  and (in later milestones) metadata/image providers that fetch from your MetaHub server.
category: "Metadata"
artifacts:
  - "MetaHub.Jellyfin.dll"
changelog: >
  0.1.8.0 - New scheduled task "MetaHub: Apply metadata to library". It walks your libraries and
  writes MetaHub's best, language-aware title/overview straight onto each item where it differs
  (skips locked fields), instead of relying on Jellyfin's per-item refresh to pick MetaHub. Run it
  once after enriching to make the localized titles actually show. Idempotent; weekly by default.
  0.1.7.9 - Language-aware titles: an anime now shows its name in your language (e.g.
  "Classroom of the Elite") instead of the romaji canonical title ("Youkoso Jitsuryoku
  Shijou Shugi no Kyoushitsu e"). Titles are localized like overviews — AniList's English and
  native titles are captured and the serve layer picks PreferredLanguage, then English, then
  the canonical title. NOTE: the embedded database schema changed, so the local cache is
  rebuilt on first start — re-run "Update anime mappings" and "Enrich metadata" afterwards.