changelog: >
  0.1.8.2 - Folder name is authoritative for season/sequel recognition ("… Reawakened" no
  longer resolves to the base series). New settings: "Match by folder/file name when no ID
  matches" and "Prefer folder name over existing IDs" (for libraries with wrong/old IDs).