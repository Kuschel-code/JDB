owner: "kuschel-code"
overview: "Aggregated, cross-linked metadata and artwork from a self-hosted MetaHub instance."
description: >
  MetaHub serves a single canonical view per media item (music, movies, series, anime,
  books), cross-linked by ID and cached locally. This plugin adds a tabbed settings page
  and (in later milestones) metadata/image providers that fetch from your MetaHub server.
category: "Metadata"
artifacts:
  - "MetaHub.Jellyfin.dll"
changelog: >
  0.1.9.4 - AniDB phase 1 follow-up. Ships the missing Episode schema change: a PostgreSQL
  migration adds the AniDB episode columns, and the embedded SQLite cache rebuilds itself on
  update (schema version 5) — without either, episode queries failed on existing databases.
  The AniDB provider now derives the work status from air dates (drives the refresh TTL) and
  picks the official title per language instead of the first one in the XML. Oversized AniDB
  responses are rejected instead of being cached truncated. Adds episode-sync tests, including
  the special/credit collision case.
  0.1.9.2 - AniDB HTTP API integration (phase 1). New metadata provider fetches titles, episodes,
  characters and artwork from AniDB's HTTP anime endpoint (gzip XML, rate-limited, ban-safe). Parsed
  data is stored as JSON in RawPayload for PostgreSQL JSONB compatibility. Episode sync populates
  AniDB episode ids, episode kind (Regular/Special/Credit/Trailer/Parody) and raw episode numbers.
  SearchTitles are now enriched with provider title translations after the merge step, so name-based
  matching improves with every enrichment run. ED2K red variant fix, AniDB UDP session re-auth with
  ban backoff, and X-Api-Key middleware for the standalone API (from the C2/C1/S1 audit).
  0.1.9.1 - Robustness hardening from a code review. A single provider's network or parse failure no
  longer aborts a work's whole enrichment (the fetch ran outside the per-provider error guard);
  fetched payloads are now cached even when every parse fails, so the next run does not re-fetch (and
  re-hit rate limits). Concurrent on-demand enrichment of the same work during a library scan is
  serialized to avoid duplicate cast/genre races. TMDB / fanart.tv / Google Books no longer write
  their API key into the log (it sat in the request URL). Added tests for the multi-chunk ED2K hash.
  0.1.9.0 - More sources and per-source control. TMDB is now fetched in your preferred language, so
  overviews/titles come back localized (e.g. German). New Shikimori provider (no key) fills posters,
  genres and episode counts for thinly-linked anime (its Russian synopsis is kept only as a
  translation). Five more anime cross-ids — AniSearch, Notify, LiveChart, Annict, Syobocal — now
  round-trip onto the item. A new "Sources" settings section lets you switch individual providers
  (AniList / Jikan / TMDB / Kitsu / fanart.tv / Shikimori / Annict) on or off.
  0.1.8.9 - More artwork and richer metadata. New fanart.tv provider (optional free key): adds
  high-quality posters, backgrounds and — uniquely — clear logos, language-aware so your
  preferred-language artwork wins; keyed by the TVDB/TMDB ids MetaHub already stores. The image
  provider now also resolves by folder name, so artwork appears even on items that have no provider
  id yet. Studios are written onto the item (the anime studio via AniList, e.g. "ufotable"; movie
  production companies via TMDB). Add the fanart.tv key in the plugin settings, then refresh.
  0.1.8.8 - Anime continuations whose distinguishing marker lives only in a synonym now resolve
  correctly. "The Disastrous Life of Saiki K. Reawakened" (manami canonical "Saiki Kusuo no
  Psi-nan: Psi-shidou-hen", with "Reawakened" only as an English synonym) no longer falls back to
  the base season's ids/overview: the sequel guard now also accepts an exact synonym match when the
  folder itself carries the marker. Refresh affected items after updating.
  0.1.8.7 - New Kitsu metadata provider (kitsu.app, no API key): fills overview, year, episode count
  and artwork for anime that manami links only to Kitsu/anime-planet and that the richer providers
  cannot fetch (e.g. "The Red Turtle"); Kitsu and AnimePlanet ids are now stamped onto the item and
  resolvable. Genres stored in the database are now also written onto the Jellyfin item — previously
  only other plugins supplied genres. Re-run the anime ingest, then refresh, to pick these up.
  0.1.8.6 - Completes the anime film/OVA name matching begun in 0.1.8.5, so works like
  "Fate/stay night [Heaven's Feel] I./II./III." finally get their ids, overview, artwork and cast
  instead of a bare folder title: folder names ending in a "I."/"II." part are no longer truncated
  at the dot (the subtitle and year survive); a "Movie:" in the canonical title no longer blocks a
  folder that omits it; and anime films/OVAs placed in a library named "Filme"/"Movies"/"Serien" are
  no longer filtered out by media type. Re-run the anime ingest task once so the search index picks
  up the new normalization.
  0.1.8.5 - Name matching strips brackets/parentheses ("Fate/stay night [Heaven's Feel]" matches a
  folder using round parentheses or none), and folder (name) matches now run on-demand enrichment
  like id matches, so a folder-matched work fills its overview/images/people.
  0.1.8.4 - Stability fixes from a code audit: the embedded SQLite database now uses WAL +
  busy_timeout and the read paths fail soft, so concurrent library scans no longer drop an item's
  metadata with "database is locked"; the "Apply metadata to library" task no longer aborts on a
  single bad item; book enrichment tolerates empty Open Library fields; TMDB tv vs movie ids no
  longer collide; and titles with a non-ASCII uppercase letter now match by name.
  0.1.8.3 - Name matching now also searches each work's synonyms/alternate titles, so an item
  whose folder uses an English name (e.g. "Even If the World Ends Tomorrow") is recognized even
  when the canonical title is the romaji ("Ashita Sekai ga Owaru to Shitemo"). Re-run the anime
  ingest task after updating so synonyms are indexed.