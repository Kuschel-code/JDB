overview: "Aggregated, cross-linked metadata and artwork from a self-hosted MetaHub instance."
description: >
  MetaHub serves a single canonical view per media item (music, movies, series, anime,
  books), cross-linked by ID and cached locally. This plugin adds a tabbed settings page
  and (in later milestones) metadata/image providers that fetch from your MetaHub server.
category: "Metadata"
artifacts:
  - "MetaHub.Jellyfin.dll"
changelog: >
  0.1.7.8 - Fixes the settings page rendering: Jellyfin loads a config page as an HTML
  fragment and dropped the <style> in <head>, so the custom design (slider toggles, tabs,
  cards) silently fell back to raw checkboxes. The page is now a bare fragment with the
  styles inside it. Also makes the per-library type dropdown readable (white-on-dark options).