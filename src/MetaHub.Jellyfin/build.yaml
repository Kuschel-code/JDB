  0.1.7.1 - MetaHub now appears for seasons and episodes too (metadata + image providers);
  episode data from Jikan (Japanese titles with preferred language "ja"); cast & crew
  (voice actors with characters, directors, composers, writers) from AniList/TMDB, shown in
  Jellyfin and exported to NFO; Japanese sources: Annict provider + ARM id mapping.