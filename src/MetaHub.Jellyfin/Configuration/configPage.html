<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>MetaHub</title>
</head>
<body>
<div id="metaHubConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-controller="__plugin/metahub">
    <div data-role="content">
        <div class="content-primary">

            <!-- Tab bar (modeled after the SkipMe.db plugin's tabbed settings) -->
            <div class="localnav">
                <a is="emby-linkbutton" class="ui-btn metaHubTab" data-tab="connection">Connection</a>
                <a is="emby-linkbutton" class="ui-btn metaHubTab" data-tab="media">Media types</a>
                <a is="emby-linkbutton" class="ui-btn metaHubTab" data-tab="identification">Identification</a>
                <a is="emby-linkbutton" class="ui-btn metaHubTab" data-tab="about">About</a>
            </div>

            <form id="metaHubConfigForm">

                <!-- Connection -->
                <div class="metaHubSection" data-section="connection">
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="ApiBaseUrl">MetaHub API URL</label>
                        <input id="ApiBaseUrl" name="ApiBaseUrl" type="url" is="emby-input" />
                        <div class="fieldDescription">Base URL of your MetaHub server, e.g. http://localhost:8080</div>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="ApiKey">API key (optional)</label>
                        <input id="ApiKey" name="ApiKey" type="password" is="emby-input" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="RequestTimeoutSeconds">Request timeout (seconds)</label>
                        <input id="RequestTimeoutSeconds" name="RequestTimeoutSeconds" type="number" min="1" max="600" is="emby-input" />
                    </div>
                    <button is="emby-button" type="button" class="raised button-cancel block" id="metaHubTestConnection">
                        <span>Test connection</span>
                    </button>
                    <div id="metaHubConnStatus" class="fieldDescription"></div>
                </div>

                <!-- Media types -->
                <div class="metaHubSection hide" data-section="media">
                    <label class="checkboxContainer">
                        <input id="EnableMusic" name="EnableMusic" type="checkbox" is="emby-checkbox" />
                        <span>Music</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableMovies" name="EnableMovies" type="checkbox" is="emby-checkbox" />
                        <span>Movies</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableSeries" name="EnableSeries" type="checkbox" is="emby-checkbox" />
                        <span>Series</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableAnime" name="EnableAnime" type="checkbox" is="emby-checkbox" />
                        <span>Anime</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableBooks" name="EnableBooks" type="checkbox" is="emby-checkbox" />
                        <span>Books</span>
                    </label>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="PreferredLanguage">Preferred language</label>
                        <input id="PreferredLanguage" name="PreferredLanguage" type="text" is="emby-input" placeholder="de" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="FallbackLanguage">Fallback language</label>
                        <input id="FallbackLanguage" name="FallbackLanguage" type="text" is="emby-input" placeholder="en" />
                    </div>
                </div>

                <!-- Identification -->
                <div class="metaHubSection hide" data-section="identification">
                    <label class="checkboxContainer">
                        <input id="EnableEd2kIdentification" name="EnableEd2kIdentification" type="checkbox" is="emby-checkbox" />
                        <span>ED2K hashing → AniDB (anime, Shoko principle)</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableAcoustIdIdentification" name="EnableAcoustIdIdentification" type="checkbox" is="emby-checkbox" />
                        <span>Acoustic fingerprint → AcoustID (music)</span>
                    </label>
                    <label class="checkboxContainer">
                        <input id="EnableIsbnIdentification" name="EnableIsbnIdentification" type="checkbox" is="emby-checkbox" />
                        <span>ISBN lookup (books)</span>
                    </label>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="MinimumConfidence">Minimum confidence (0–1)</label>
                        <input id="MinimumConfidence" name="MinimumConfidence" type="number" min="0" max="1" step="0.05" is="emby-input" />
                    </div>
                </div>

                <!-- About -->
                <div class="metaHubSection hide" data-section="about">
                    <p>MetaHub aggregates cross-linked metadata and artwork from a self-hosted instance.</p>
                    <p>Identification determines the identity of files you already own; it does not fetch content.</p>
                    <p><a is="emby-linkbutton" class="button-link" href="https://github.com/kuschel-code/jdb" target="_blank">Project on GitHub</a></p>
                </div>

                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        (function () {
            var MetaHubConfig = {
                pluginId: 'a3f1c2d4-5b6e-47a8-9c0d-1e2f3a4b5c6d'
            };

            var page;

            function showTab(name) {
                page.querySelectorAll('.metaHubSection').forEach(function (s) {
                    s.classList.toggle('hide', s.getAttribute('data-section') !== name);
                });
                page.querySelectorAll('.metaHubTab').forEach(function (t) {
                    t.classList.toggle('ui-btn-active', t.getAttribute('data-tab') === name);
                });
            }

            function load(config) {
                page.querySelector('#ApiBaseUrl').value = config.ApiBaseUrl || '';
                page.querySelector('#ApiKey').value = config.ApiKey || '';
                page.querySelector('#RequestTimeoutSeconds').value = config.RequestTimeoutSeconds;
                page.querySelector('#EnableMusic').checked = config.EnableMusic;
                page.querySelector('#EnableMovies').checked = config.EnableMovies;
                page.querySelector('#EnableSeries').checked = config.EnableSeries;
                page.querySelector('#EnableAnime').checked = config.EnableAnime;
                page.querySelector('#EnableBooks').checked = config.EnableBooks;
                page.querySelector('#PreferredLanguage').value = config.PreferredLanguage || '';
                page.querySelector('#FallbackLanguage').value = config.FallbackLanguage || '';
                page.querySelector('#EnableEd2kIdentification').checked = config.EnableEd2kIdentification;
                page.querySelector('#EnableAcoustIdIdentification').checked = config.EnableAcoustIdIdentification;
                page.querySelector('#EnableIsbnIdentification').checked = config.EnableIsbnIdentification;
                page.querySelector('#MinimumConfidence').value = config.MinimumConfidence;
            }

            function save() {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(MetaHubConfig.pluginId).then(function (config) {
                    config.ApiBaseUrl = page.querySelector('#ApiBaseUrl').value;
                    config.ApiKey = page.querySelector('#ApiKey').value;
                    config.RequestTimeoutSeconds = parseInt(page.querySelector('#RequestTimeoutSeconds').value, 10) || 30;
                    config.EnableMusic = page.querySelector('#EnableMusic').checked;
                    config.EnableMovies = page.querySelector('#EnableMovies').checked;
                    config.EnableSeries = page.querySelector('#EnableSeries').checked;
                    config.EnableAnime = page.querySelector('#EnableAnime').checked;
                    config.EnableBooks = page.querySelector('#EnableBooks').checked;
                    config.PreferredLanguage = page.querySelector('#PreferredLanguage').value;
                    config.FallbackLanguage = page.querySelector('#FallbackLanguage').value;
                    config.EnableEd2kIdentification = page.querySelector('#EnableEd2kIdentification').checked;
                    config.EnableAcoustIdIdentification = page.querySelector('#EnableAcoustIdIdentification').checked;
                    config.EnableIsbnIdentification = page.querySelector('#EnableIsbnIdentification').checked;
                    config.MinimumConfidence = parseFloat(page.querySelector('#MinimumConfidence').value) || 0.8;

                    ApiClient.updatePluginConfiguration(MetaHubConfig.pluginId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });
            }

            function testConnection() {
                var status = page.querySelector('#metaHubConnStatus');
                var base = page.querySelector('#ApiBaseUrl').value.replace(/\/+$/, '');
                status.textContent = 'Testing...';
                fetch(base + '/health')
                    .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
                    .then(function () { status.textContent = '✓ Connected to MetaHub.'; })
                    .catch(function (e) { status.textContent = '✗ Could not reach MetaHub (' + e + ').'; });
            }

            document.querySelector('#metaHubConfigPage').addEventListener('pageshow', function () {
                page = this;
                Dashboard.showLoadingMsg();

                page.querySelectorAll('.metaHubTab').forEach(function (t) {
                    t.addEventListener('click', function () { showTab(t.getAttribute('data-tab')); });
                });
                page.querySelector('#metaHubTestConnection').addEventListener('click', testConnection);
                page.querySelector('#metaHubConfigForm').addEventListener('submit', function (e) {
                    e.preventDefault();
                    save();
                    return false;
                });

                ApiClient.getPluginConfiguration(MetaHubConfig.pluginId).then(function (config) {
                    load(config);
                    showTab('connection');
                    Dashboard.hideLoadingMsg();
                });
            });
        })();
    </script>
</div>
</body>
</html>
