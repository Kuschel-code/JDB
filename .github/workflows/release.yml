name: Release

# Builds self-contained zips for each runtime and attaches them to a GitHub Release
# whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish API (${{ matrix.rid }})
        run: |
          dotnet publish src/MetaHub.Api/MetaHub.Api.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            --output publish/${{ matrix.rid }}

      - name: Package zip
        run: |
          mkdir -p artifacts
          zip -r -j "artifacts/metahub-${{ github.ref_name }}-${{ matrix.rid }}.zip" "publish/${{ matrix.rid }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metahub-${{ matrix.rid }}
          path: artifacts/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
