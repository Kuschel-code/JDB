name: Release

# Builds self-contained zips for each runtime + the Jellyfin plugin zip, attaches them to a
# GitHub Release, and updates the plugin repository manifest.
#
# Triggers:
#  - push of a version tag (e.g. v0.1.0), or
#  - manual run ("Run workflow") with a version input — handy when you cannot push tags
#    locally; the workflow creates the tag/release itself.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish API (${{ matrix.rid }})
        run: |
          dotnet publish src/MetaHub.Api/MetaHub.Api.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            --output publish/${{ matrix.rid }}

      - name: Package zip
        run: |
          mkdir -p artifacts
          zip -r -j "artifacts/metahub-${{ needs.setup.outputs.version }}-${{ matrix.rid }}.zip" "publish/${{ matrix.rid }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metahub-${{ matrix.rid }}
          path: artifacts/*.zip

  plugin:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Stamp plugin version
        # Jellyfin derives the installed version from the assembly (and the generated meta.json).
        # Without this the assembly stays at the csproj default while the manifest advances, so
        # Jellyfin sees a perpetual "update available" and restart-loops. Keep them in sync.
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          VERSION="${VERSION#v}"
          # Jellyfin expects a 4-part version (x.y.z -> x.y.z.0).
          if [ "$(echo "$VERSION" | tr -cd '.' | wc -c)" -eq 2 ]; then VERSION="${VERSION}.0"; fi
          echo "PLUGIN_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version: .*/version: \"$VERSION\"/" src/MetaHub.Jellyfin/build.yaml

      - name: Build Jellyfin plugin
        run: |
          dotnet publish src/MetaHub.Jellyfin/MetaHub.Jellyfin.csproj \
            --configuration Release \
            -p:Version="$PLUGIN_VERSION" \
            -p:AssemblyVersion="$PLUGIN_VERSION" \
            -p:FileVersion="$PLUGIN_VERSION" \
            --output publish/jellyfin-plugin

      - name: Package plugin zip
        run: |
          mkdir -p artifacts staging
          cp src/MetaHub.Jellyfin/build.yaml staging/
          # Bundle MetaHub assemblies + the third-party deps Jellyfin does NOT ship.
          # EF Core, SQLite and the Microsoft.Extensions.* contracts come from the host
          # (bundling them would cause cross-boundary type conflicts).
          for f in MetaHub.*.dll \
                   Npgsql.dll Npgsql.EntityFrameworkCore.PostgreSQL.dll \
                   Polly.dll Polly.Extensions.Http.dll Microsoft.Extensions.Http.Polly.dll; do
            cp publish/jellyfin-plugin/$f staging/ 2>/dev/null || true
          done
          ( cd staging && zip -r "../artifacts/metahub-jellyfin-plugin-${{ needs.setup.outputs.version }}.zip" . )

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: metahub-jellyfin-plugin
          path: artifacts/*.zip

  release:
    needs: [setup, build, plugin]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          target_commitish: main
          name: ${{ needs.setup.outputs.version }}
          files: artifacts/**/*.zip
          generate_release_notes: true

  manifest:
    # Updates the Jellyfin plugin repository manifest so the stable repo link
    # (raw .../main/manifest.json) offers the new version.
    needs: [setup, plugin, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: metahub-jellyfin-plugin
          path: dist

      - name: Update manifest.json
        env:
          TAG: ${{ needs.setup.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          ZIP=$(ls dist/*.zip | head -n1)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          VERSION="${TAG#v}"
          # Jellyfin expects a 4-part version (x.y.z -> x.y.z.0).
          if [ "$(echo "$VERSION" | grep -o '\.' | wc -l)" -eq 2 ]; then VERSION="${VERSION}.0"; fi
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$ZIP")"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg changelog "Release $TAG" \
            --arg targetAbi "10.11.0.0" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$CHECKSUM" \
            --arg timestamp "$TS" \
            '{version:$version, changelog:$changelog, targetAbi:$targetAbi, sourceUrl:$sourceUrl, checksum:$checksum, timestamp:$timestamp}')

          # Prepend the new version (newest first), replacing any existing entry for it.
          jq --argjson entry "$ENTRY" \
            '.[0].versions = ([$entry] + (.[0].versions | map(select(.version != $entry.version))))' \
            manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          cat manifest.json

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update plugin manifest for ${{ needs.setup.outputs.version }}" || echo "no changes"
          git push origin HEAD:main

      - name: Attach manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          files: manifest.json
