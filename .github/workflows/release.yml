name: Release

# Builds self-contained zips for each runtime and attaches them to a GitHub Release
# whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish API (${{ matrix.rid }})
        run: |
          dotnet publish src/MetaHub.Api/MetaHub.Api.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            --output publish/${{ matrix.rid }}

      - name: Package zip
        run: |
          mkdir -p artifacts
          zip -r -j "artifacts/metahub-${{ github.ref_name }}-${{ matrix.rid }}.zip" "publish/${{ matrix.rid }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metahub-${{ matrix.rid }}
          path: artifacts/*.zip

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Jellyfin plugin
        run: |
          dotnet publish src/MetaHub.Jellyfin/MetaHub.Jellyfin.csproj \
            --configuration Release \
            --output publish/jellyfin-plugin

      - name: Package plugin zip
        run: |
          mkdir -p artifacts
          cp src/MetaHub.Jellyfin/build.yaml publish/jellyfin-plugin/ || true
          zip -r -j "artifacts/metahub-jellyfin-plugin-${{ github.ref_name }}.zip" \
            "publish/jellyfin-plugin/MetaHub.Jellyfin.dll" \
            "publish/jellyfin-plugin/build.yaml"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: metahub-jellyfin-plugin
          path: artifacts/*.zip

  release:
    needs: [build, plugin]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true

  manifest:
    # Updates the Jellyfin plugin repository manifest so the stable repo link
    # (raw .../main/manifest.json) offers the new version.
    needs: [plugin, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: metahub-jellyfin-plugin
          path: dist

      - name: Update manifest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          ZIP=$(ls dist/*.zip | head -n1)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          VERSION="${TAG#v}"
          # Jellyfin expects a 4-part version (x.y.z -> x.y.z.0).
          if [ "$(echo "$VERSION" | grep -o '\.' | wc -l)" -eq 2 ]; then VERSION="${VERSION}.0"; fi
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$ZIP")"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg changelog "Release $TAG" \
            --arg targetAbi "10.10.0.0" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$CHECKSUM" \
            --arg timestamp "$TS" \
            '{version:$version, changelog:$changelog, targetAbi:$targetAbi, sourceUrl:$sourceUrl, checksum:$checksum, timestamp:$timestamp}')

          # Prepend the new version (newest first), replacing any existing entry for it.
          jq --argjson entry "$ENTRY" \
            '.[0].versions = ([$entry] + (.[0].versions | map(select(.version != $entry.version))))' \
            manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          cat manifest.json

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update plugin manifest for ${{ github.ref_name }}" || echo "no changes"
          git push origin HEAD:main

      - name: Attach manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: manifest.json
